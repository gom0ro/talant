{% extends 'base.html' %}
{% load static %}

{% block title %}{{ page.title }} | Талант №1{% endblock %}

{% block content %}
<div class="page-header py-5 bg-light border-bottom text-center">
  <div class="container">
    <h1 class="page-header-title text-uppercase fw-bold m-0" style="color: #1e293b;">{{ page.title }}</h1>
  </div>
</div>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-10">
      {% if page.image %}
      <div class="text-center mb-5">
        <img src="{{ page.image.url }}" alt="{{ page.title }}" class="img-fluid rounded shadow w-100" style="max-height: 400px; object-fit: cover;">
      </div>
      {% endif %}
      <div class="card shadow-sm border-0">
        <div class="card-body p-4 p-md-5 fs-5 lh-lg text-secondary" style="text-align: justify;">
          {{ page.content|safe }}
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
